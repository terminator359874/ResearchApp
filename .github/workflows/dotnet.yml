name: .NET CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # 1. Добавляем MSBuild в окружение
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # 2. Восстанавливаем зависимости через MSBuild (для поддержки wapproj)
      - name: Restore dependencies
        run: msbuild /t:Restore /p:Configuration=Release

      # 3. Сборка всего решения через MSBuild
      # Это решит проблему с поиском Microsoft.DesktopBridge.props
      - name: Build
        run: msbuild ResearchApp.sln /p:Configuration=Release /p:UapAppxPackageBuildMode=SideloadOnly

      # Тесты можно оставить через dotnet test, они должны работать
      - name: Run Tests
        run: dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # Рекомендуется добавить токен в секреты репозитория
          files: '**/coverage.cobertura.xml'
          fail_ci_if_error: true

      - name: Generate Coverage Report
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          reportgenerator -reports:**/coverage.cobertura.xml -targetdir:coverage -reporttypes:Html

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
